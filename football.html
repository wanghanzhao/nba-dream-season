<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>世界杯圆梦阵容</title>
    <link rel="stylesheet" href="./styles.css?v=20260710-football-v154" />
  </head>
  <body>
    <main class="phone-shell football-shell">
      <section class="hero" id="homeView">
        <div class="hero-art football-art">
          <div class="score-logo">WC<span>11</span></div>
          <h1>世界杯圆梦阵容</h1>
          <p>随机国家队、年代和阵型，组出 11 人首发，带无冠球星冲击世界杯。</p>
        </div>
        <div class="home-actions">
          <button id="normalBtn" class="primary" type="button">开始世界杯</button>
          <button id="dreamBtn" class="gold" type="button">圆梦模式</button>
          <button id="historyBtn" class="ghost" type="button">历史最佳</button>
          <a class="ghost link-button" href="./index.html">返回合集</a>
        </div>
      </section>

      <section class="screen hidden" id="dreamView">
        <header class="screen-head">
          <button id="dreamBackBtn" type="button">返回</button>
          <div>
            <p>选择圆梦对象</p>
            <h2>世界杯遗憾名单</h2>
          </div>
        </header>
        <div id="dreamGrid" class="dream-grid"></div>
      </section>

      <section class="screen hidden" id="draftView">
        <header class="draft-top">
          <button id="draftHomeBtn" type="button">首页</button>
          <div>
            <p id="modeLabel">普通模式</p>
            <h2>组建首发</h2>
          </div>
          <button id="restartBtn" type="button">重开</button>
        </header>

        <div id="pitch" class="football-pitch"></div>
        <div id="dreamNote" class="dream-note hidden"></div>

        <section class="round-panel">
          <div class="round-title">
            <strong id="roundText">第 1 / 11 位</strong>
            <span id="roundHint">先随机国家、年代和阵型</span>
          </div>

          <div class="random-row football-random">
            <div>
              <span>抽中国家</span>
              <strong id="teamText">???</strong>
            </div>
            <div>
              <span>抽中年代</span>
              <strong id="eraText">???</strong>
            </div>
            <div>
              <span>阵型</span>
              <strong id="formationText">???</strong>
            </div>
          </div>

          <div id="teamProfile" class="team-profile hidden"></div>
          <div id="formationChoices" class="formation-choices hidden"></div>

          <button id="randomBtn" class="primary" type="button">随机</button>
          <button id="lockBtn" class="gold hidden" type="button">锁定球员池</button>
          <button id="rerollFormationBtn" class="ghost hidden" type="button">换一组阵型</button>

          <div id="globalRerollRow" class="reroll-row hidden">
            <button id="rerollTeamBtn" type="button">重抽国家 <span id="teamRerollText">1</span>次</button>
            <button id="rerollEraBtn" type="button">重抽年代 <span id="eraRerollText">1</span>次</button>
          </div>
        </section>

        <section id="playerSection" class="player-section hidden">
          <div class="section-title">
            <h2>选择球员</h2>
            <div class="section-title-actions">
              <span id="selectHint">先点球员，再点球场位置</span>
              <button id="autoFillBtn" type="button">智能放置</button>
            </div>
          </div>
          <div class="filters" id="filters"></div>
          <div id="playerList" class="player-list"></div>
        </section>
      </section>

      <section class="screen hidden" id="resultView">
        <header class="screen-head">
          <button id="resultHomeBtn" type="button">首页</button>
          <div>
            <p>世界杯结算</p>
            <h2 id="resultTitle">圆梦成功</h2>
          </div>
        </header>
        <div id="resultCard" class="result-card"></div>
        <div class="result-actions">
          <button id="againBtn" class="primary" type="button">再来一届</button>
          <button id="copyReportBtn" type="button">复制战报</button>
        </div>
      </section>

      <section class="screen hidden" id="historyView">
        <header class="screen-head">
          <button id="historyBackBtn" type="button">返回</button>
          <div>
            <p>本机记录</p>
            <h2>历史最佳</h2>
          </div>
        </header>
        <div id="historyList" class="history-list"></div>
      </section>

      <div id="toast" class="toast hidden"></div>
    </main>

    <script src="./src/football.js?v=20260710-v154"></script>
  </body>
</html>
